# p-lanes configuration
# Generated by setup.py — edit manually or re-run setup.py to reconfigure.

# ==================================================
# Identity
# ==================================================
brain:
  name: "Brain"
  description: "Brain in a box. Local, private, discreet."

# ==================================================
# Paths
# ==================================================
paths:
  log_file: "/var/log/p-lanes/p-lanes.log"
  user_data_root: "/var/lib/p-lanes/users"
  model: "/var/lib/models/Qwen_Qwen3-VL-8B-Instruct-Q6_K.gguf"
  projector: "/var/lib/models/mmproj-Qwen3VL-8B-Instruct-F16.gguf"
  llama_server: "/opt/llama.cpp/build/bin/llama-server"

# ==================================================
# Network
# ==================================================
network:
  llm_host: "localhost"
  llm_port: 8080
  brain_host: "0.0.0.0"
  brain_port: 7860

# ==================================================
# LLM Settings
# ==================================================
llm:
  timeout: 60             # seconds — http response timeout
  startup_timeout: 90     # seconds — wait for server to become ready
  gpu_layers: 99
  flash_attn: false
  mlock: false
  kv_cache_type: "q8_0"
  recovery:
    max_retries: 5        # attempts before giving up
    initial_wait: 5       # seconds — first retry delay
    max_wait: 120         # seconds — cap on backoff delay

# ==================================================
# Slots / KV Cache
# ==================================================
slots:
  count: 5                # 4 persistent users + 1 utility
  ctx_total: 40960        # total context across all slots (set to 61440 for production)

# ==================================================
# Summarization
# ==================================================
# Token budgets are calculated as percentages of the
# remaining context after subtracting the static
# system header budget.
#
# Example at 12,288 per slot:
#   remaining       = 12,288 - 128 = 12,160
#   summary cap     = 12,160 * 0.10 = 1,216 tokens
#   recent budget   = 12,160 * 0.15 = 1,824 tokens
#   post-summarize  = ~30% of slot
#   headroom to crit = ~50% of slot (~27-33 exchanges)
#
summarization:
  threshold_warn: 0.70    # flag_warn — background summarize when idle
  threshold_crit: 0.80    # flag_crit — immediate summarize
  lock_wait: 6            # seconds to wait for slot lock before dropping
  system_header_budget: 128       # static token budget for system prompt/persona
  summary_max_percent: 0.10       # max summary size as % of remaining context
  keep_recent_percent: 0.15       # recent messages to keep as % of remaining context
  chars_per_token: 3              # conservative estimate for token budgeting (lower = safer)
  scheduled:
    enabled: true
    cron: "0 2 * * *"     # daily at 0200
    restart_llm: true     # restart llama-server after scheduled summary

# ==================================================
# Idle / Background Checks
# ==================================================
idle:
  timeout: 300            # seconds before user is considered idle
  check_interval: 120     # seconds between idle + health check cycles

# ==================================================
# Default Sampling Parameters
# ==================================================
sampling:
  temperature: 0.7
  min_p: 0.05
  top_k: 40
  repeat_penalty: 1.1
  frequency_penalty: 0.0
  max_tokens: 512

# ==================================================
# Guest Account
# ==================================================
guest:
  enabled: true

# ==================================================
# Utility Lane
# ==================================================
# When enabled, summarization and other background
# tasks run on the dedicated utility slot without
# blocking the user. When disabled, background tasks
# fall back to the requesting user's own slot with
# a brief lock.
# ==================================================
utility:
  enabled: true

# ==================================================
# Module Permissions
# ==================================================
# module_name: minimum_security_level
module_permissions: {}

# ==================================================
# Providers (STT / TTS)
# ==================================================
providers:
  stt:
    enabled: true
    url: "http://192.168.1.13:8100"
    timeout: 30
    retries: 1
  tts:
    enabled: true
    url: "http://192.168.1.14:8200"
    timeout: 30
    retries: 0

# ==================================================
# Logging
# ==================================================
logging:
  level: "INFO"
  format: "json"          # json or console