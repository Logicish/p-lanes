# p-lanes configuration
# Generated by setup.py — edit manually or re-run setup.py to reconfigure.

# ==================================================
# Identity
# ==================================================
brain:
  name: "Brain"
  description: "Brain in a box. Local, private, discreet."

# ==================================================
# Paths
# ==================================================
paths:
  log_file: "/var/log/p-lanes/p-lanes.log"
  user_data_root: "/var/lib/p-lanes/users"
  model: "/var/lib/models/Qwen_Qwen3-VL-8B-Instruct-Q6_K.gguf"
  projector: "/var/lib/models/mmproj-Qwen3VL-8B-Instruct-F16.gguf"
  llama_server: "/opt/llama.cpp/build/bin/llama-server"

# ==================================================
# Network
# ==================================================
network:
  llm_host: "localhost"
  llm_port: 8080
  brain_host: "0.0.0.0"
  brain_port: 7860

# ==================================================
# LLM Settings
# ==================================================
llm:
  timeout: 60             # seconds — http response timeout
  startup_timeout: 90     # seconds — wait for server to become ready
  gpu_layers: 99
  flash_attn: false
  mlock: false
  kv_cache_type: "q8_0"
  recovery:
    max_retries: 5        # attempts before giving up
    initial_wait: 5       # seconds — first retry delay
    max_wait: 120         # seconds — cap on backoff delay

# ==================================================
# Slots / KV Cache
# ==================================================
slots:
  count: 5                # 4 persistent users + 1 utility
  ctx_total: 61440        # total context across all slots

# ==================================================
# Summarization
# ==================================================
summarization:
  threshold_warn: 0.70    # flag_warn — background summarize when idle
  threshold_crit: 0.80    # flag_crit — immediate summarize
  lock_wait: 6            # seconds to wait for slot lock before dropping
  keep_recent: 4          # recent messages to preserve after summarize
  scheduled:
    enabled: true
    cron: "0 2 * * *"     # daily at 0200
    restart_llm: true     # restart llama-server after scheduled summary

# ==================================================
# Idle / Background Checks
# ==================================================
idle:
  timeout: 300            # seconds before user is considered idle
  check_interval: 120     # seconds between idle + health check cycles

# ==================================================
# Default Sampling Parameters
# ==================================================
sampling:
  temperature: 0.7
  min_p: 0.05
  top_k: 40
  repeat_penalty: 1.1
  frequency_penalty: 0.0
  max_tokens: 512

# ==================================================
# Security Levels
# ==================================================
# 0=GUEST, 1=USER, 2=POWER, 3=TRUSTED, 4=ADMIN
#
# Users
# ==================================================
users:
  user1:
    slot: 0
    security: 3           # TRUSTED
  user2:
    slot: 1
    security: 1           # USER
  user3:
    slot: 2
    security: 1           # USER
  guest:
    slot: 3
    security: 0           # GUEST
  utility:
    slot: 4
    security: 4           # ADMIN

# ==================================================
# Guest Account
# ==================================================
guest:
  enabled: true

# ==================================================
# Module Permissions
# ==================================================
# module_name: minimum_security_level
module_permissions: {}

# ==================================================
# Logging
# ==================================================
logging:
  level: "INFO"
  format: "json"          # json or console